services:
  - type: worker
    name: waifu-catch-bot
    runtime: python
    buildCommand: pip install -r bot/requirements.txt
    startCommand: python bot/main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GOD_ADMIN_ID
        sync: false
      - key: PYTHONPATH
        value: bot
      - key: PYTHONUNBUFFERED
        value: "1"
